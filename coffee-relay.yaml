esphome:
  name: coffee-relay
  friendly_name: Coffee Relay

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Coffee-Relay Fallback Hotspot"
    password: !secret fallback_ap_password

captive_portal:

esp32_ble_tracker:

globals:
  - id: shot_fired
    type: bool
    restore_value: no
    initial_value: 'false'

ble_client:
  - mac_address: 58:8C:81:AE:61:36
    id: wmb_scale
    on_connect:
      then:
        - lambda: 'id(shot_fired) = false;'
        - logger.log: "✅ Connected — armed and ready"
    on_disconnect:
      then:
        - logger.log: "❌ Disconnected"

sensor:
  - platform: ble_client
    type: characteristic
    ble_client_id: wmb_scale
    service_uuid: '6E400001-B5A3-F393-E0A9-E50E24DCCA9E'
    characteristic_uuid: '6E400004-B5A3-F393-E0A9-E50E24DCCA9E'
    name: "Live Shot Weight"
    id: live_weight
    notify: true
    update_interval: never
    unit_of_measurement: "g"
    accuracy_decimals: 1
    lambda: |-
      if (x.size() < 4) return NAN;
      union {
        float f;
        uint8_t bytes[4];
      } w;
      w.bytes[0] = x[0];
      w.bytes[1] = x[1];
      w.bytes[2] = x[2];
      w.bytes[3] = x[3];
      
      // Ignore timer signals
      if (w.f <= -997.0f) return {};
      
      return w.f;
    on_value:
      then:
        - lambda: |-
            float weight = x;
            
            if (!id(shot_fired) && weight >= id(target_weight).state && weight > 2.0) {
              id(shot_fired) = true;
              ESP_LOGI("brew", "🎯 TARGET %.1fg HIT at %.1fg — STOPPING!", id(target_weight).state, weight);
              id(brew_relay).turn_on();
            }
            
            // Auto-reset when cup removed
            if (id(shot_fired) && weight < 1.0) {
              id(shot_fired) = false;
              ESP_LOGI("brew", "🔄 Cup removed — ready for next shot");
            }

        - if:
            condition:
              lambda: 'return id(shot_fired) && id(brew_relay).state;'
            then:
              - delay: 1000ms
              - switch.turn_off: brew_relay

switch:
  - platform: gpio
    pin: GPIO16
    id: brew_relay
    name: "Brew Button Relay"
    icon: "mdi:coffee-maker"
    restore_mode: ALWAYS_OFF

number:
  - platform: template
    name: "Target Weight"
    id: target_weight
    min_value: 0
    max_value: 100
    step: 0.1
    initial_value: 36.0
    unit_of_measurement: "g"
    optimistic: true

button:
  - platform: template
    name: "Test Relay Click"
    on_press:
      - switch.turn_on: brew_relay
      - delay: 1000ms
      - switch.turn_off: brew_relay

  - platform: template
    name: "Reset"
    icon: "mdi:restart"
    on_press:
      - lambda: 'id(shot_fired) = false;'
      - logger.log: "🔄 Manual reset"
